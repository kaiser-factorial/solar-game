<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Shard 🌙</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌙</text></svg>" />
    <style>
      html, body { margin: 0; height: 100%; background: #05060f; overflow: hidden; }
      #game { width: 100vw; height: 100vh; }
      canvas { image-rendering: pixelated; }
      .ss-form {
        display: flex; flex-direction: column; gap: 14px; align-items: center;
        font-family: "Courier New", monospace; width: 340px;
      }
      .ss-form input {
        width: 260px; padding: 12px 16px; font-size: 20px; text-align: center;
        font-family: inherit; color: #eaf2ff; background: #101530;
        border: 2px solid #3a4a8a; border-radius: 12px; outline: none;
      }
      .ss-form input:focus { border-color: #7fd4ff; }
      .ss-btn {
        width: 296px; padding: 12px; font-size: 20px; font-weight: bold;
        font-family: inherit; border-radius: 12px; cursor: pointer;
        border: 2px solid #7fd4ff; background: #1c3f7a; color: #ffffff;
      }
      .ss-btn:hover { background: #2a58a8; }
      .ss-btn.ghost { background: transparent; border-color: #3a4a8a; color: #9fb0d8; }
      .ss-btn.ghost:hover { border-color: #7fd4ff; color: #eaf2ff; }
      .ss-msg { min-height: 22px; color: #ff9e9e; font-size: 14px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
